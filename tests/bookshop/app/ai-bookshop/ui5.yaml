specVersion: '4.0'
metadata:
  name: ai-bookshop
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
    - name: ui5-task-zipper
      afterTask: generateVersionInfo
      configuration:
        archiveName: ai-bookshop
        relativePaths: true
        additionalFiles:
          - xs-app.json
